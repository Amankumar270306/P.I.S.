version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pis
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  backend:
    build: ./backend
    container_name: pis_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/pis
      AI_MODEL_URL: ${AI_MODEL_URL:-http://host.docker.internal:11434/v1/chat/completions}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-llama3.1:8b}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: .
    container_name: pis_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000 # Client-side calls still hit localhost
    restart: always
  # Optional: Poller service for Outlook Sync
  # poller:
  #   build: ./backend
  #   container_name: pis_poller
  #   depends_on:
  #     - backend
  #   command: python integrations/outlook/sync_outlook.py
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/pis
  #     AI_MODEL_URL: ${AI_MODEL_URL}
  #   restart: unless-stopped

volumes:
  pgdata:
