services:
  db:
    image: postgres:15-alpine
    container_name: pis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pis
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../db/add_indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
    ports:
      - "5433:5432"
    restart: always

  backend:
    build: 
      context: ../../backend
    container_name: pis_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@pis_db:5432/pis
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: nvidia/nemotron-3-super-120b-a12b:free
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: 
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: pis_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: always

volumes:
  pgdata:
